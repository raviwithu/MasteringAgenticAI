name: CI

# Lint and test on every push / PR. The dev container that provisions the full
# environment lives in the surrounding workspace, not in this repo.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint Python with ruff
        run: ruff check --output-format=github .

  test-threat-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        working-directory: "Week 1/ai-threat-modeling-assistant"
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-dotenv langchain-core

      - name: Run threat-model functional flow tests
        working-directory: "Week 1/ai-threat-modeling-assistant"
        env:
          USE_MOCK_LLM: "true"
        run: pytest
