name: CI

# Validate the workspace on every push / PR:
#   1. devcontainer.json is well-formed JSON
#   2. the Jupyter startup script has valid bash syntax
#   3. any Python code lints cleanly with ruff
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Validate devcontainer.json
        run: |
          python -c "import json; json.load(open('.devcontainer/devcontainer.json')); print('devcontainer.json: valid JSON')"

      - name: Check shell script syntax
        run: bash -n .devcontainer/start-jupyter.sh

      - name: Lint Python with ruff
        run: ruff check --output-format=github .
